<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgB" x1="180" y1="140" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fa0ff"/>
      <stop offset="1" stop-color="#2a55da"/>
    </linearGradient>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe6ff"/>
      <stop offset="1" stop-color="#f3f8ff"/>
    </linearGradient>
    <clipPath id="frontB"><rect x="362" y="430" width="300" height="224" rx="28"/></clipPath>
    <filter id="bodyShadowB" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0a1c4d" flood-opacity="0.30"/>
    </filter>
    <filter id="cardShadowB" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#0a1c4d" flood-opacity="0.24"/>
    </filter>
  </defs>
  <g filter="url(#bodyShadowB)">
    <rect x="104" y="104" width="816" height="816" rx="182" fill="url(#bgB)"/>
  </g>

  <!-- 后两张（扇形错位，边角明显露出） -->
  <g filter="url(#cardShadowB)">
    <g transform="rotate(13 512 542) translate(30 -4)">
      <rect x="362" y="430" width="300" height="224" rx="28" fill="#cfe0fa"/>
    </g>
    <g transform="rotate(-10 512 542) translate(-30 2)">
      <rect x="362" y="430" width="300" height="224" rx="28" fill="#e6eefb"/>
    </g>
  </g>

  <!-- 前卡（含风景） -->
  <g filter="url(#cardShadowB)">
    <rect x="362" y="430" width="300" height="224" rx="28" fill="#ffffff"/>
  </g>
  <g clip-path="url(#frontB)">
    <rect x="362" y="430" width="300" height="224" fill="url(#skyB)"/>
    <circle cx="444" cy="496" r="31" fill="#ffc23d"/>
    <path d="M362 598 L450 506 L520 572 L580 528 L662 606 L662 654 L362 654 Z" fill="#5b8de8"/>
    <path d="M362 654 L432 576 L512 640 L582 590 L662 642 L662 654 Z" fill="#2f63d6"/>
  </g>
  <rect x="362" y="430" width="300" height="224" rx="28" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.9"/>
</svg>
